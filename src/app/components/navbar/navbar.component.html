<!-- Announcement Banner -->
<div class="banner" *ngIf="showBanner">
  🎉 Board Exams 2025 Preparation Guide now available!
  <a (click)="toast.show('Checking resources...')"> Start preparing now →</a>
  <button class="banner-close" (click)="showBanner=false"><i class="fas fa-times"></i></button>
</div>

<nav [class.scrolled]="scrolled()">
  <a class="nav-logo" routerLink="/" (click)="closeMobile()">
    <div class="logo-icon"><img src="assets/images/logo.png" alt="Quantum Classes Logo"></div>
    Quantum<span>Classes</span>
  </a>

  <div class="nav-links" [class.mobile-open]="mobileOpen()">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" (click)="closeMobile()">Home</a>
    <a routerLink="/courses" routerLinkActive="active" (click)="closeMobile()">Courses</a>
    <a href="#teachers" (click)="closeMobile()">Teachers</a>
    <a href="#exams" (click)="closeMobile()">Exams</a>
    <a href="#app" (click)="closeMobile()">App</a>
    <a href="javascript:void(0)" (click)="openPdf()" class="pdf-link"><i class="fas fa-file-pdf"></i> Resources</a>
    @if (auth.isLoggedIn()) {
      <a routerLink="/dashboard" routerLinkActive="active" (click)="closeMobile()">Dashboard</a>
    }
  </div>

  <div class="nav-right">
    @if (!auth.isLoggedIn()) {
      <!-- <button class="btn-outline" (click)="openLogin()">Sign In</button> -->
      <!-- <button class="btn-primary" (click)="openSignup()">Get Started Free</button> -->
    } @else {
      <div class="user-avatar">S</div>
      <button class="btn-outline" (click)="logout()">Logout</button>
    }
  </div>

  <button class="hamburger" (click)="toggleMobile()">
    <i class="fas" [class.fa-bars]="!mobileOpen()" [class.fa-times]="mobileOpen()"></i>
  </button>
</nav>
