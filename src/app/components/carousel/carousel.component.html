<section class="carousel-section">
  <div class="container">
    <div class="carousel-wrapper">
      <!-- Main Carousel -->
      <div class="carousel">
        @for (slide of slides; track slide.title) {
          @if (currentSlide() === $index) {
            <div class="slide active" [style.--slide-color]="slide.color">
              <div class="slide-content">
                <img class="max-w-[100%]" src="{{ slide.image }}" alt="{{ slide.title }}">
                <!-- <div class="slide-icon">{{ slide.icon }}</div>
                <h2 class="slide-title">{{ slide.title }}</h2>
                <p class="slide-description">{{ slide.description }}</p> -->
              </div>
            </div>
          }
        }
      </div>

      <!-- Navigation Buttons -->
      <button class="carousel-btn prev" (click)="prevSlide()" title="Previous">
        <i class="fas fa-chevron-left"></i>
      </button>
      <button class="carousel-btn next" (click)="nextSlide()" title="Next">
        <i class="fas fa-chevron-right"></i>
      </button>

      <!-- Indicators -->
      <div class="carousel-indicators">
        @for (slide of slides; track $index) {
          <button 
            class="indicator" 
            [class.active]="currentSlide() === $index"
            (click)="goToSlide($index)"
            [attr.aria-label]="'Go to slide ' + ($index + 1)">
          </button>
        }
      </div>
    </div>
  </div>
</section>
