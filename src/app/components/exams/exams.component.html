<section class="exams-section" id="exams">
  <div class="container">
    <div class="section-header center">
      <span class="section-label">Subjects & Boards</span>
      <h2 class="section-title">Complete Coverage for All Class 12 Boards</h2>
      <p class="section-desc">Expert-crafted content for CBSE, ICSE, and State Boards - Master all subjects for board exams</p>
    </div>
    <div class="exams-grid">
      @for (exam of exams; track exam.name) {
        <a class="exam-card" routerLink="/courses">
          <div class="exam-icon">{{ exam.icon }}</div>
          <div class="exam-name">{{ exam.name }}</div>
          <!-- <div class="exam-count">{{ exam.count }}</div> -->
        </a>
      }
    </div>
  </div>
</section>
