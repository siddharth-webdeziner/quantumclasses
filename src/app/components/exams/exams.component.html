<section class="exams-section" id="exams">
  <div class="container">
    <div class="section-header center">
      <span class="section-label">Exam Categories</span>
      <h2 class="section-title">Prepare for Every Competitive Exam</h2>
      <p class="section-desc">Comprehensive preparation material tailored for India's top competitive exams</p>
    </div>
    <div class="exams-grid">
      @for (exam of exams; track exam.name) {
        <a class="exam-card" routerLink="/courses">
          <div class="exam-icon">{{ exam.icon }}</div>
          <div class="exam-name">{{ exam.name }}</div>
          <div class="exam-count">{{ exam.count }}</div>
        </a>
      }
    </div>
  </div>
</section>
